<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ShiftLog — HVE Reporting</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --a:#3b82f6; --bg:#050505; --card:#0d0d0d; --bd:#1a1a1a;
  --m:#666; --w:#f0f0f0; --w2:#ccc; --g:#22c55e; --am:#f59e0b; --r:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Plus Jakarta Sans',sans-serif}
body{background:var(--bg);color:var(--w);min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
input,select,button,textarea{font-family:inherit}
a{color:var(--a);text-decoration:none}

/* nav */
.nav{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:rgba(5,5,5,.92);backdrop-filter:blur(10px);z-index:50}
.logo{font-size:16px;font-weight:800;cursor:pointer;flex-shrink:0}
.logo .b{color:var(--a)} .logo .l{color:var(--w)}
.nav-spacer{flex:1}
.nav-btn{background:transparent;border:1px solid var(--bd);color:var(--m);padding:5px 12px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.nav-btn.active{background:var(--a);border-color:var(--a);color:#fff}
.avatar{width:26px;height:26px;border-radius:50%;background:rgba(59,130,246,.18);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--a);flex-shrink:0}

/* layout */
.wrap{padding:20px 16px 48px}
.container{max-width:880px;margin:0 auto}
.narrow{max-width:440px;margin:30px auto}
.center{text-align:center}

/* cards */
.card{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:20px}
.card.glow{border-color:rgba(59,130,246,.4);box-shadow:0 0 20px rgba(59,130,246,.1)}
.card.pulse{animation:pulseGlow 2.4s ease-in-out infinite}

/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:13px 26px;border-radius:10px;border:none;background:#181818;color:var(--w);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;line-height:1.4;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn.accent{background:var(--a);color:#fff;box-shadow:0 0 20px rgba(59,130,246,.2)}
.btn.outline{background:transparent;border:1px solid var(--bd);color:var(--w2)}
.btn.small{padding:8px 16px;font-size:12px}
.btn.full{width:100%}
.btn:disabled{background:#1a1a1a;color:#444;cursor:not-allowed;box-shadow:none}

/* inputs */
.field{margin-bottom:14px}
.label{font-size:10px;color:var(--m);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.input{width:100%;background:#111;border:1px solid var(--bd);border-radius:8px;padding:11px 13px;color:var(--w);font-size:13px;outline:none;transition:border-color .2s}
.input:focus{border-color:var(--a)}
.row{display:flex;gap:12px;flex-wrap:wrap}
.row .field{flex:1;min-width:0;margin-bottom:0}

/* tags */
.tag{font-size:9px;font-weight:700;padding:3px 8px;border-radius:12px;text-transform:uppercase;letter-spacing:.4px}

/* counter */
.counter{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--bd)}
.counter .cl{flex:1;font-size:14px;font-weight:500;color:var(--w2)}
.stepper{display:flex;align-items:center;background:#141414;border-radius:12px;padding:3px 5px;transition:box-shadow .2s}
.stepper.flash{box-shadow:0 0 12px rgba(59,130,246,.35)}
.stepper button{width:52px;height:52px;background:transparent;border:none;color:var(--m);font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:10px;transition:color .12s, background .12s}
.stepper button.minus:hover,.stepper button.minus:active{color:var(--r);background:rgba(239,68,68,.1)} .stepper button.plus:hover,.stepper button.plus:active{color:var(--g);background:rgba(34,197,94,.1)}
.stepper .val{min-width:44px;text-align:center;font-size:20px;font-weight:700;transition:transform .15s,color .15s}
.spotlight{background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.2);border-radius:10px;padding:6px 12px;margin-bottom:10px}

/* stat tiles */
.tiles{display:flex;gap:10px;flex-wrap:wrap}
.tile{flex:1 1 0;min-width:80px;background:#0a0a0a;border:1px solid var(--bd);border-radius:10px;padding:14px 16px}
.tile.glow{border-color:rgba(59,130,246,.35);box-shadow:0 0 20px rgba(59,130,246,.12)}
.tile .tv{font-size:26px;font-weight:800;line-height:1.1}
.tile .tl{font-size:9px;color:var(--m);text-transform:uppercase;letter-spacing:.4px;margin-top:5px}

/* bars */
.bar{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.bar .bl{font-size:10px;color:var(--m);width:80px;text-align:right;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar .bt{flex:1;height:16px;background:#0a0a0a;border-radius:4px;overflow:hidden}
.bar .bf{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.16,1,.3,1)}
.bar .bv{font-size:11px;font-weight:700;color:var(--w);width:26px;text-align:right;flex-shrink:0}

/* table */
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--bd);border-radius:8px}
table{width:100%;border-collapse:collapse;font-size:11px}
thead tr{background:#0a0a0a}
th{padding:8px 10px;text-align:left;color:var(--m);border-bottom:1px solid var(--bd);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
td{padding:8px 10px;white-space:nowrap}

/* dropzone */
.dropzone{border:2px dashed var(--bd);border-radius:10px;padding:28px 16px;text-align:center;cursor:pointer;transition:all .2s}
.dropzone.over{border-color:var(--a);background:rgba(59,130,246,.06)}
.filechip{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#0a0a0a;border-radius:6px;margin-bottom:3px;font-size:12px;color:var(--w2)}
.filechip .fn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.filechip .fx{color:var(--m);cursor:pointer;font-size:14px}

/* leaderboard */
.lb{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:16px;width:200px;flex-shrink:0}
.lb-head{display:flex;align-items:center;gap:6px;margin-bottom:12px}
.lb-dot{width:7px;height:7px;border-radius:50%;background:var(--g);box-shadow:0 0 6px rgba(34,197,94,.5);animation:blink 1.5s infinite}
.lb-title{font-size:10px;font-weight:700;color:var(--w);letter-spacing:1px;text-transform:uppercase}
.lb-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bd)}
.lb-row:last-of-type{border-bottom:none}
.lb-medal{font-size:18px;line-height:1}
.lb-name{font-size:12px;font-weight:600;color:var(--w);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-badge{font-size:9px;color:var(--m)}
.lb-c{font-size:16px;font-weight:800}
.lb-cl{font-size:8px;color:var(--m);text-transform:uppercase}

/* misc */
.h1{font-size:24px;font-weight:800;margin-bottom:2px}
.sub{color:var(--m);font-size:13px;margin-bottom:20px}
.muted{color:var(--m)}
.err{font-size:11px;color:var(--am);padding:10px;background:rgba(245,158,11,.08);border-radius:8px;line-height:1.4;margin-bottom:12px}
.dots span{display:inline-block;width:5px;height:5px;border-radius:50%;background:#fff;margin-left:3px;animation:bdot .5s ease infinite alternate}
.dots span:nth-child(2){animation-delay:.12s} .dots span:nth-child(3){animation-delay:.24s}
.hidden{display:none!important}
.fade-in{animation:fadeIn .45s cubic-bezier(.16,1,.3,1) both}

@keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes bdot{from{transform:translateY(0)}to{transform:translateY(-3px)}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 20px rgba(245,158,11,.08)}50%{box-shadow:0 0 28px rgba(245,158,11,.2)}}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes shakeX{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.check{width:64px;height:64px;border-radius:50%;border:3px solid var(--g);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;animation:popIn .4s cubic-bezier(.16,1,.3,1);box-shadow:0 0 30px rgba(34,197,94,.25)}
.shake{animation:shakeX .35s ease}
canvas.confetti{position:fixed;inset:0;width:100vw;height:100vh;pointer-events:none;z-index:9999}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;animation:fadeIn .2s}
.modal{background:var(--card);border:1px solid var(--bd);border-radius:16px;padding:24px;max-width:560px;width:100%;animation:popIn .25s cubic-bezier(.16,1,.3,1)}
.editgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;margin:16px 0}
.editrow{display:flex;align-items:center;gap:8px}
.editrow .el{flex:1;font-size:12px;color:var(--w2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.editrow input{width:56px;background:#111;border:1px solid var(--bd);border-radius:6px;padding:6px 8px;color:var(--w);font-size:13px;text-align:center;outline:none}
.editrow input:focus{border-color:var(--a)}
.subrow{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--bd);flex-wrap:wrap}

/* accordion */
.acc-card{background:var(--card);border:1px solid var(--bd);border-radius:12px;overflow:hidden;transition:border-color .2s}
.acc-card-open{border-color:rgba(59,130,246,.3)}
.acc-header{width:100%;display:flex;align-items:center;gap:10px;padding:13px 16px;background:transparent;border:none;color:var(--w);cursor:pointer;text-align:left;transition:background .15s}
.acc-header:hover{background:rgba(255,255,255,.03)}
.acc-title{flex:1;font-size:12px;font-weight:700;color:var(--w2);text-transform:uppercase;letter-spacing:.5px}
.acc-badge{background:var(--a);color:#fff;font-size:10px;font-weight:800;min-width:20px;height:20px;border-radius:10px;padding:0 6px;display:inline-flex;align-items:center;justify-content:center}
.acc-chevron{font-size:11px;color:var(--m);flex-shrink:0;transition:transform .2s}
.acc-body{display:none;padding:0 4px 8px;border-top:1px solid var(--bd)}
.acc-body.open{display:block;animation:fadeIn .18s both}


.announce{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);border-radius:10px;margin-bottom:16px;animation:fadeIn .3s both}
.announce .a-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.announce .a-text{flex:1;font-size:13px;line-height:1.5;color:var(--w2)}
.announce .a-close{color:var(--m);cursor:pointer;font-size:16px;flex-shrink:0;padding:2px 4px}

/* profile sections */
.profile-section{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:20px;margin-bottom:16px}
.profile-section h3{font-size:13px;font-weight:700;color:var(--a);text-transform:uppercase;letter-spacing:.6px;margin-bottom:16px}

/* history table rows */
.hist-row{padding:12px 0;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s}
.hist-row:hover{background:rgba(255,255,255,.02);border-radius:6px}
.hist-expand{display:none;padding:10px 0 4px;grid-template-columns:1fr 1fr;gap:6px 16px}
.hist-expand.open{display:grid}
.hist-cat{font-size:11px;color:var(--m);display:flex;justify-content:space-between}
.hist-cat span:last-child{color:var(--w2);font-weight:600}
</style>
</head>
<body>
<div class="nav">
  <span class="logo" onclick="App.go(App.user?'form':'landing')" id="app-logo"><span class="b">Shift</span><span class="l">Log</span></span>
  <div class="nav-spacer"></div>
  <div id="navlinks" style="display:flex;gap:6px;align-items:center"></div>
</div>
<div class="wrap"><div id="view"></div></div>

<script>
// Grouped categories with icons: [key, icon, label]
const CAT_GROUPS = [
  {title:null, spotlight:true, items:[
    ['total_contacts','🚔','Total Contacts']
  ]},
  {title:'🦺 Safety Citations', items:[
    ['seat_belt','🔒','Seat Belt Citations'],
    ['child_safety_seat','👶','Child Safety Seat']
  ]},
  {title:'🚦 Traffic Violations', items:[
    ['speeding','⚡','Speeding Citations'],
    ['texting','📱','Texting Citations'],
    ['suspended_licenses','🪪','Suspended Licenses'],
    ['uninsured_motorists','🚫','Uninsured Motorists'],
    ['reckless_driving','💥','Reckless Driving'],
    ['inattentive_driving','😵','Inattentive Driving']
  ]},
  {title:'🍺 DUI & Alcohol', items:[
    ['dui_alcohol','🍺','DUI - Alcohol'],
    ['dui_drugs','💊','DUI - Drugs'],
    ['dui_drugs_alcohol','⚗️','DUI - Drugs & Alcohol'],
    ['underage_alcohol','🔞','Underage Alcohol']
  ]},
  {title:'🚨 Criminal Activity', items:[
    ['felony_arrests','⛓️','Felony Arrests'],
    ['recovered_stolen','🚗','Recovered Stolen Vehicles'],
    ['fugitives','🏃','Fugitives Apprehended']
  ]},
  {title:'🏍️ Specialty', items:[
    ['motorcycle_endorsement','🏍️','Motorcycle Endorsement'],
    ['bicycle_pedestrian','🚲','Bicycle / Pedestrian'],
    ['other_activity','📋','Other Activity']
  ]},
];
// Flat list (key -> label) for totals, init, and lookups
const CATS = CAT_GROUPS.flatMap(g => g.items.map(([k,icon,label]) => [k,label]));
const CAT_ICON = Object.fromEntries(CAT_GROUPS.flatMap(g => g.items.map(([k,icon]) => [k,icon])));

const MEDIA = [
  ['media_letters','✉️','Letters'],['media_press','📰','Press Release'],['media_social','📲','Social Media'],
  ['media_events','🎪','Events'],['media_interviews','🎤','Interviews'],
  ['media_presentations','📊','Presentations'],['media_other','📋','Other']
];

const App = {
  user: null,
  page: 'landing',
  form: {},
  settings: {},

  async init(){
    try {
      const [meR, setR] = await Promise.all([fetch('/api/me'), fetch('/api/settings')]);
      const meJ = await meR.json();
      const setJ = await setR.json();
      this.user = meJ.user;
      this.settings = setJ || {};
      if(this.settings.app_name) {
        document.title = this.settings.app_name + ' — HVE Reporting';
        const logo = document.getElementById('app-logo');
        if(logo) {
          const name = this.settings.app_name;
          const mid = Math.ceil(name.length/2);
          logo.innerHTML = `<span class="b">${name.slice(0,mid)}</span><span class="l">${name.slice(mid)}</span>`;
        }
      }
    } catch(e){}
    this.go(this.user ? 'form' : 'landing');
  },

  async api(path, method='GET', body){
    const opt = {method, headers:{}};
    if(body){ opt.headers['Content-Type']='application/json'; opt.body=JSON.stringify(body); }
    const r = await fetch(path, opt);
    let j = {};
    try { j = await r.json(); } catch(e){}
    return {ok:r.ok, status:r.status, data:j};
  },

  go(page){
    this.page = page;
    this.renderNav();
    const v = document.getElementById('view');
    v.innerHTML = '';
    const fn = this['page_'+page];
    if(fn) fn.call(this, v);
    v.classList.remove('fade-in'); void v.offsetWidth; v.classList.add('fade-in');
    window.scrollTo(0,0);
  },

  renderNav(){
    const n = document.getElementById('navlinks');
    let links = [];
    if(this.user){
      links.push(['form','Form']);
      links.push(['history','My History']);
      if(['admin','supervisor'].includes(this.user.role)) links.push(['supervisor','Supervisor']);
      if(this.user.role==='admin') links.push(['admin','Admin']);
    }
    let html = links.map(([id,label])=>
      `<button class="nav-btn ${this.page===id?'active':''}" onclick="App.go('${id}')">${label}</button>`
    ).join('');
    if(this.user){
      html += `<div style="display:flex;align-items:center;gap:6px;margin-left:6px">
        <div class="avatar" style="cursor:pointer" onclick="App.go('profile')" title="My Profile">${(this.user.name||'?')[0]}</div>
        <span style="font-size:10px;color:var(--w2);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${this.user.name}</span>
        <span style="font-size:10px;color:var(--m);cursor:pointer" onclick="App.logout()">Logout</span>
      </div>`;
    } else {
      html += `<button class="nav-btn active" onclick="App.go('login')">Log In</button>
               <button class="nav-btn" onclick="App.go('signup')">Sign Up</button>`;
    }
    n.innerHTML = html;
  },

  async logout(){ await this.api('/api/logout','POST'); this.user=null; this.go('landing'); },

  // ===== animations =====
  countUp(el, target, dur=1000){
    let s=null; const step=t=>{ if(!s)s=t; const p=Math.min((t-s)/dur,1);
      el.textContent = Math.round((1-Math.pow(1-p,3))*target);
      if(p<1) requestAnimationFrame(step); }; requestAnimationFrame(step);
  },
  confetti(){
    const c=document.createElement('canvas'); c.className='confetti'; document.body.appendChild(c);
    c.width=innerWidth; c.height=innerHeight; const ctx=c.getContext('2d');
    const cols=['#3b82f6','#8b5cf6','#22c55e','#f59e0b','#ef4444','#ec4899','#06b6d4'];
    let P=Array.from({length:110},()=>({x:Math.random()*c.width,y:-20-Math.random()*300,w:4+Math.random()*5,h:8+Math.random()*8,vx:(Math.random()-.5)*5,vy:2+Math.random()*4,r:Math.random()*360,rv:(Math.random()-.5)*10,c:cols[~~(Math.random()*cols.length)],o:1}));
    let f=0; const draw=()=>{ ctx.clearRect(0,0,c.width,c.height);
      P.forEach(p=>{p.x+=p.vx;p.vy+=.1;p.y+=p.vy;p.r+=p.rv;if(f>50)p.o=Math.max(0,p.o-.01);
        ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r*Math.PI/180);ctx.globalAlpha=p.o;ctx.fillStyle=p.c;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();});
      f++; if(f<180) requestAnimationFrame(draw); else c.remove(); };
    requestAnimationFrame(draw);
  },

  // ===== pages render below (injected) =====
};

// ===================== PAGES =====================

App.page_landing = function(v){
  v.innerHTML = `
    <div class="center" style="padding-top:60px;max-width:520px;margin:0 auto">
      <div style="font-size:44px;font-weight:800;margin-bottom:6px">
        <span style="color:var(--a);text-shadow:0 0 30px rgba(59,130,246,.3)">Shift</span><span style="color:var(--w)">Log</span></div>
      <p style="color:var(--m);font-size:15px;line-height:1.6;margin-bottom:36px">HVE Traffic Task Force Reporting.<br/>Track, report, and analyze enforcement activity.</p>
      <div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap">
        <button class="btn accent" onclick="App.go('login')">Log In</button>
        <button class="btn outline" onclick="App.go('signup')">Sign Up</button>
      </div>
    </div>`;
};

App.page_signup = function(v){
  v.innerHTML = `
    <div class="narrow">
      <h2 class="h1">Create Account</h2>
      <p class="sub">Join your department's ShiftLog.</p>
      <div class="card">
        <div class="field"><label class="label">Last Name</label><input class="input" id="su-name" placeholder="e.g. Hansen"/></div>
        <div class="row" style="margin-bottom:14px">
          <div class="field"><label class="label">Badge Number</label><input class="input" id="su-badge" placeholder="e.g. 4521"/></div>
          <div class="field"><label class="label">Department</label><input class="input" id="su-dept" placeholder="Blackfoot PD" value="${App.settings.default_department||'Blackfoot PD'}"/></div>
        </div>
        <div class="field"><label class="label">Email</label><input class="input" id="su-email" type="email" placeholder="officer@department.gov"/></div>
        <div class="field"><label class="label">Password</label><input class="input" id="su-pw" type="password" placeholder="Create a password"/></div>
        <div class="field"><label class="label">Role</label>
          <select class="input" id="su-role">
            <option value="officer">Officer</option>
            <option value="supervisor">Supervisor (requires admin approval)</option>
          </select></div>
        <div id="su-err"></div>
        <button class="btn accent full" id="su-btn" onclick="App.doSignup()">Create Account</button>
      </div>
      <div class="center" style="margin-top:14px">
        <span class="muted" style="font-size:12px">Already have an account? </span>
        <a style="font-size:12px;font-weight:600;cursor:pointer" onclick="App.go('login')">Log In</a>
      </div>
    </div>`;
};

App.doSignup = async function(){
  const g = id => document.getElementById(id).value.trim();
  const body = {name:g('su-name'),badge:g('su-badge'),department:g('su-dept'),
    email:g('su-email'),password:document.getElementById('su-pw').value,role:g('su-role')};
  const errEl = document.getElementById('su-err');

    <button class="acc-header" onclick="App.toggleAcc('acc-media')" id="acc-media-btn">
      <span class="acc-title">📣 Media Outreach</span>
      <span class="acc-badge" id="acc-media-badge" style="display:none"></span>
      <span class="acc-chevron" id="acc-media-chev">▸</span>

  v.innerHTML = `

            <div><div class="label">Badge</div><div style="font-size:14px;font-weight:700">#${u.badge}</div></div>
            <div><div class="label">Dept</div><div style="font-size:14px;font-weight:700">${u.department||'—'}</div></div>

            <span class="tag" style="background:rgba(59,130,246,.15);color:var(--a)">${u.role}</span>

  App._accGroups = CAT_GROUPS.slice(1).map((g, gi) => ({
    id: 'acc-'+gi,
    keys: g.items.map(([k])=>k)
  }));
  App._accGroups.push({ id: 'acc-media', keys: MEDIA.map(([k])=>k) });

  CATS.concat(MEDIA.map(m=>[m[0],m[2]])).forEach(([k])=> this.form[k]=0);

App.bump = function(key,delta){
  this.form[key] = Math.max(0,(this.form[key]||0)+delta);
  const el = document.getElementById('v-'+key);
  el.textContent = this.form[key];
  el.style.color = this.form[key]>0 ? 'var(--a)' : 'var(--w)';
  el.style.transform='scale(1.25)'; setTimeout(()=>el.style.transform='scale(1)',150);
  const st = document.getElementById('st-'+key); st.classList.add('flash'); setTimeout(()=>st.classList.remove('flash'),250);
  // total = sum of activity cats only
  let t=0; CATS.forEach(([k])=> t+=this.form[k]||0);
  const tot=document.getElementById('f-total'); tot.textContent=t; tot.style.color=t>0?'var(--a)':'var(--m)';
  // update accordion group badge
  this.updateAccBadges();
};

App.toggleAcc = function(id){
  const body = document.getElementById(id+'-body');
  const chev = document.getElementById(id+'-chev');
  const card = document.getElementById(id+'-card');
  if(!body) return;
  const open = body.classList.toggle('open');
  if(chev) chev.textContent = open ? '▾' : '▸';
  if(card) card.classList.toggle('acc-card-open', open);
};

App.updateAccBadges = function(){
  (App._accGroups||[]).forEach(({id, keys})=>{
    const badge = document.getElementById(id+'-badge');
    if(!badge) return;
    const count = keys.filter(k=>(App.form[k]||0)>0).length;
    const total = keys.reduce((a,k)=>a+(App.form[k]||0),0);
    if(count>0){
      badge.style.display='inline-flex';
      badge.textContent = total;
    } else {
      badge.style.display='none';
    }
  });
};

App.loadLeaderboard = async function(){
  const {data} = await App.api('/api/leaderboard');
  const lb = document.getElementById('lb'); if(!lb) return;
  const medals=['🥇','🥈','🥉'];
  let rows = (data.leaders||[]).map((o,i)=>`
    <div class="lb-row">
      <span class="lb-medal">${medals[i]}</span>
      <div style="flex:1;min-width:0"><div class="lb-name">${o.name}</div><div class="lb-badge">#${o.badge}</div></div>
      <div style="text-align:right"><div class="lb-c" style="color:${i===0?'var(--a)':'var(--w)'}">${o.contacts}</div><div class="lb-cl">contacts</div></div>
    </div>`).join('');
  if(!rows) rows = '<div class="muted" style="font-size:11px;padding:8px 0">No submissions today yet.</div>';
  lb.innerHTML = `<div class="lb-head"><div class="lb-dot"></div><span class="lb-title">Today's Leaders</span></div>${rows}
    <div style="margin-top:8px;text-align:center;font-size:8px;color:var(--m)">Live • updates every 30s</div>`;

};

App.loadAnnouncementBanner = async function(){
  const el = document.getElementById('announce-banner'); if(!el) return;
  // Use settings loaded at init first, fallback to API
  const active = App.settings.announcement_active === 'true';
  const text = App.settings.announcement_text || '';
  if(!active || !text.trim()){ el.innerHTML=''; return; }
  if(App._announceDismissed){ el.innerHTML=''; return; }
  el.innerHTML=`<div class="announce">
    <span class="a-icon">📢</span>
    <span class="a-text">${text}</span>
    <span class="a-close" onclick="App._announceDismissed=true;document.getElementById('announce-banner').innerHTML=''" title="Dismiss">✕</span>
  </div>`;
};

App.checkDuplicate = async function(date){
  const warn = document.getElementById('dup-warn'); if(!warn||!date) return;
  const {data} = await App.api('/api/check_duplicate?date='+encodeURIComponent(date));
  if(data.duplicate){
    warn.style.display='block';
    warn.innerHTML=`<div class="err" style="color:var(--am);background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.25)">
      ⚠️ You already have a submission for this date. Submitting again will add a second entry.
    </div>`;
  } else {
    warn.style.display='none'; warn.innerHTML='';
  }
};

App.loadHistory = async function(){
  const el=document.getElementById('hist-content'); if(!el) return;
  const {data}=await App.api('/api/my_submissions');
  const subs=data.submissions||[];
  if(!subs.length){
    el.innerHTML='<div class="card"><p class="muted" style="font-size:13px">No submissions yet. Submit your first report using the Form.</p></div>';
    return;
  }

  // Compute totals
  let totalContacts=0, totalForms=subs.length;
  subs.forEach(s=>{ totalContacts+=(s.cats.total_contacts||0); });

  const catLabel = Object.fromEntries(CATS);

  const rows = subs.map((sub,i)=>{
    const tc = sub.cats.total_contacts||0;
    const citations = ['seat_belt','speeding','texting','suspended_licenses','child_safety_seat',
      'reckless_driving','inattentive_driving','uninsured_motorists'].reduce((a,k)=>a+(sub.cats[k]||0),0);
    const arrests = ['dui_alcohol','dui_drugs','dui_drugs_alcohol','felony_arrests'].reduce((a,k)=>a+(sub.cats[k]||0),0);
    const activeCats = CATS.filter(([k])=>(sub.cats[k]||0)>0);
    return `<div class="hist-row" onclick="App.toggleHist(${i})">
      <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
        <div style="min-width:90px">
          <div style="font-size:13px;font-weight:700;color:var(--w)">${sub.date}</div>
          <div style="font-size:10px;color:var(--m)">${sub.start_time&&sub.end_time?sub.start_time+' – '+sub.end_time:sub.created}</div>
        </div>
        <div style="display:flex;gap:16px;flex:1;flex-wrap:wrap">
          <div style="text-align:center"><div style="font-size:17px;font-weight:800;color:var(--a)">${tc}</div><div style="font-size:8px;color:var(--m);text-transform:uppercase">contacts</div></div>
          <div style="text-align:center"><div style="font-size:17px;font-weight:800;color:#8b5cf6">${citations}</div><div style="font-size:8px;color:var(--m);text-transform:uppercase">citations</div></div>
          <div style="text-align:center"><div style="font-size:17px;font-weight:800;color:var(--r)">${arrests}</div><div style="font-size:8px;color:var(--m);text-transform:uppercase">arrests</div></div>
          ${sub.ot_hours?`<div style="text-align:center"><div style="font-size:17px;font-weight:800;color:var(--g)">${sub.ot_hours}</div><div style="font-size:8px;color:var(--m);text-transform:uppercase">OT hrs</div></div>`:''}
          ${sub.mileage?`<div style="text-align:center"><div style="font-size:17px;font-weight:800">${sub.mileage}</div><div style="font-size:8px;color:var(--m);text-transform:uppercase">miles</div></div>`:''}
        </div>
        <span style="font-size:12px;color:var(--m)" id="hist-arrow-${i}">▸</span>
      </div>
      <div class="hist-expand" id="hist-exp-${i}">
        ${activeCats.map(([k,l])=>`<div class="hist-cat"><span>${l}</span><span>${sub.cats[k]}</span></div>`).join('')}
        ${sub.details?`<div style="grid-column:1/-1;font-size:11px;color:var(--m);padding-top:4px;border-top:1px solid var(--bd);margin-top:4px">📝 ${sub.details}</div>`:''}
        ${!activeCats.length&&!sub.details?'<div style="font-size:11px;color:var(--m);grid-column:1/-1">No category data recorded.</div>':''}
      </div>
    </div>`;
  }).join('');

  el.innerHTML=`
    <div class="tiles" style="margin-bottom:16px">
      <div class="tile glow"><div class="tv" style="color:var(--a)">${totalContacts}</div><div class="tl">Total Contacts</div></div>
      <div class="tile"><div class="tv">${totalForms}</div><div class="tl">Reports Filed</div></div>
    </div>

};

// ---- date range handling ----
App._fmt = function(d){ return d.toISOString().slice(0,10); };
App.presetDates = function(preset){
  const today = new Date();
  if(preset==='week'){ const s=new Date(today); s.setDate(s.getDate()-6); return {start:App._fmt(s), end:App._fmt(today)}; }
  if(preset==='month'){ const s=new Date(today.getFullYear(), today.getMonth(), 1); return {start:App._fmt(s), end:App._fmt(today)}; }
  return {start:null, end:null};
};
App.applyPresetButtonState = function(){
  document.querySelectorAll('#range-presets .nav-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.preset===App.range.preset);
  });
  document.getElementById('custom-range').classList.toggle('hidden', App.range.preset!=='custom');
};
App.setRange = function(preset){
  App.range.preset = preset;
  if(preset!=='custom'){ const r=App.presetDates(preset); App.range.start=r.start; App.range.end=r.end; }
  App.applyPresetButtonState();
  if(preset!=='custom'){ App.loadSummary(); App.loadPerformance(); }
};
App.applyCustom = function(){
  App.range.start = document.getElementById('range-start').value || null;
  App.range.end = document.getElementById('range-end').value || null;
  App.loadSummary(); App.loadPerformance();
};
App.rangeQS = function(){
  const p=[]; if(App.range.start) p.push('start='+App.range.start); if(App.range.end) p.push('end='+App.range.end);
  return p.length?('&'+p.join('&')):'';
};
App.rangeLabel = function(){
  if(App.range.preset==='week') return 'this week';
  if(App.range.preset==='month') return 'this month';
  if(App.range.preset==='custom' && (App.range.start||App.range.end)) return `${App.range.start||'…'} → ${App.range.end||'…'}`;
  return 'all time';
};

    <div class="card">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
        <span style="font-size:12px;font-weight:700;color:var(--a);text-transform:uppercase;letter-spacing:.8px">📄 Submitted Reports (${subs.length})</span>
        <div style="flex:1"></div>
        <select class="input" style="width:auto;font-size:11px;padding:7px 10px" onchange="App.subFilter=this.value;App.loadAdminSubs()">
          <option value="all">All Officers</option>
          ${officers.map(o=>`<option value="${o}" ${App.subFilter===o?'selected':''}>${o}</option>`).join('')}
        </select>
        <button class="btn accent small" onclick="App.showAddSubModal()">＋ Add Submission</button>
      </div>
      ${subs.length? subs.map(sub=>{
        const total = Object.values(sub.cats).reduce((a,b)=>a+b,0);
        return `<div class="subrow">
          <div style="flex:1;min-width:140px">
            <div style="font-size:13px;font-weight:600">${sub.officer||'—'} <span style="color:var(--m);font-weight:400">#${sub.badge||''}</span></div>
            <div style="font-size:10px;color:var(--m)">${sub.date} • submitted ${sub.created}</div>
          </div>
          <div style="text-align:center"><div style="font-size:16px;font-weight:800;color:var(--a)">${sub.cats.total_contacts||0}</div><div style="font-size:8px;color:var(--m);text-transform:uppercase">contacts</div></div>
          <div style="text-align:center"><div style="font-size:16px;font-weight:800">${total}</div><div style="font-size:8px;color:var(--m);text-transform:uppercase">total</div></div>
          <button class="btn outline small" onclick="App.editSub(${sub.id})">✎ Edit</button>
          <span style="font-size:13px;color:#555;cursor:pointer;padding:6px" title="Delete report" onclick="App.deleteSub(${sub.id})">🗑</span>
        </div>`;
      }).join('') : '<div class="muted" style="font-size:12px;padding:10px 0">No submissions found.</div>'}
    </div>`;
};

App.showAddSubModal = async function(){
  const offRes = await App.api('/api/admin/users');
  const officers = (offRes.data.users||[]).filter(u=>u.role==='officer'||u.role==='supervisor'||u.role==='admin');
  const cats = App._adminCats||[];
  const today = new Date().toISOString().slice(0,10);
  const modal=document.createElement('div'); modal.className='modal-bg'; modal.id='editmodal';
  modal.innerHTML=`<div class="modal" style="max-width:640px">
    <div style="display:flex;align-items:center;margin-bottom:4px">
      <h2 style="font-size:18px;font-weight:800">Add Submission</h2>
      <div style="flex:1"></div>
      <span style="cursor:pointer;color:var(--m);font-size:20px" onclick="App.closeModal()">✕</span>
    </div>
    <p style="color:var(--m);font-size:12px;margin-bottom:12px">Manually add a report for any officer.</p>
    <div class="row" style="margin-bottom:0">
      <div class="field"><label class="label">Officer</label>
        <select class="input" id="as-officer" onchange="App._fillSubOfficer()">
          <option value="">— Select officer —</option>
          ${officers.map(u=>`<option value="${u.id}" data-name="${u.name}" data-badge="${u.badge}" data-dept="${u.department||''}">${u.name} #${u.badge}</option>`).join('')}
        </select>
      </div>
      <div class="field"><label class="label">Shift Date</label><input class="input" id="as-date" type="date" value="${today}"/></div>
    </div>
    <div class="row" style="margin-bottom:0">
      <div class="field"><label class="label">Start Time</label><input class="input" id="as-start" placeholder="e.g. 6:00 PM"/></div>
      <div class="field"><label class="label">End Time</label><input class="input" id="as-end" placeholder="e.g. 2:00 AM"/></div>
      <div class="field" style="flex:0 0 70px"><label class="label">OT Hrs</label><input class="input" id="as-ot" placeholder="0"/></div>
      <div class="field" style="flex:0 0 70px"><label class="label">Miles</label><input class="input" id="as-miles" placeholder="0"/></div>
    </div>
    <div class="editgrid" style="margin:12px 0">
      ${cats.map(c=>`<div class="editrow"><span class="el">${c.label}</span><input type="number" min="0" id="as-${c.key}" value="0"/></div>`).join('')}
    </div>
    <div class="field"><label class="label">Details</label><textarea class="input" id="as-details" rows="2" placeholder="Optional notes…"></textarea></div>
    <div id="as-err"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn outline small" onclick="App.closeModal()">Cancel</button>
      <button class="btn accent small" id="as-save" onclick="App.doAddSub()">Save Submission</button>
    </div>
  </div>`;
  document.body.appendChild(modal);
  modal.onclick=e=>{ if(e.target===modal) App.closeModal(); };
};

App._fillSubOfficer = function(){
  const sel=document.getElementById('as-officer');
  const opt=sel.options[sel.selectedIndex];
};

App.doAddSub = async function(){
  const sel=document.getElementById('as-officer');
  const opt=sel.options[sel.selectedIndex];
  if(!opt.value){ document.getElementById('as-err').innerHTML='<div class="err shake">Please select an officer.</div>'; return; }
  const cats={}; (App._adminCats||[]).forEach(c=>{ cats[c.key]=parseInt(document.getElementById('as-'+c.key)?.value||0); });
  const body={
    officer_name: opt.dataset.name, badge: opt.dataset.badge,
    department: opt.dataset.dept,
    shift_date: document.getElementById('as-date').value,
    start_time: document.getElementById('as-start').value,
    end_time: document.getElementById('as-end').value,
    ot_hours: document.getElementById('as-ot').value,
    mileage: document.getElementById('as-miles').value,
    details: document.getElementById('as-details').value,
    ...cats
  };
  const btn=document.getElementById('as-save'); btn.disabled=true; btn.innerHTML='Saving…';
  const {ok,data}=await App.api('/api/admin/add_submission','POST',body);
  if(!ok){ document.getElementById('as-err').innerHTML=`<div class="err shake">${data.error||'Failed.'}</div>`; btn.disabled=false; btn.textContent='Save Submission'; return; }
  App.closeModal(); App.loadAdminSubs();
};

App.editSub = function(id){
  const sub = (App._adminSubs||[]).find(s=>s.id===id); if(!sub) return;
  const cats = App._adminCats||[];
  const modal = document.createElement('div');
  modal.className='modal-bg'; modal.id='editmodal';
  modal.innerHTML = `
    <div class="modal">
      <div style="display:flex;align-items:center;margin-bottom:4px">
        <h2 style="font-size:18px;font-weight:800">Edit Submission</h2>
        <div style="flex:1"></div>
        <span style="cursor:pointer;color:var(--m);font-size:20px" onclick="App.closeModal()">✕</span>
      </div>
      <p style="color:var(--m);font-size:12px;margin-bottom:8px">${sub.officer} #${sub.badge} • ${sub.date}</p>
      <div class="row" style="margin-bottom:4px">
        <div class="field"><label class="label">Shift Date</label><input class="input" id="e-date" value="${sub.date||''}"/></div>
        <div class="field"><label class="label">Start</label><input class="input" id="e-start" value="${sub.start_time||''}"/></div>
        <div class="field"><label class="label">End</label><input class="input" id="e-end" value="${sub.end_time||''}"/></div>
        <div class="field" style="flex:0 0 70px"><label class="label">OT</label><input class="input" id="e-ot" value="${sub.ot_hours||''}"/></div>
        <div class="field" style="flex:0 0 70px"><label class="label">Miles</label><input class="input" id="e-miles" value="${sub.mileage||''}"/></div>
      </div>
      <div class="editgrid">
        ${cats.map(c=>`<div class="editrow"><span class="el">${c.label}</span><input type="number" min="0" id="e-${c.key}" value="${sub.cats[c.key]||0}"/></div>`).join('')}
      </div>
      <div class="field"><label class="label">Details</label><textarea class="input" id="e-details" rows="2">${sub.details||''}</textarea></div>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button class="btn outline small" onclick="App.closeModal()">Cancel</button>
        <button class="btn accent small" id="e-save" onclick="App.saveSub(${id})">Save Changes</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  modal.onclick=e=>{ if(e.target===modal) App.closeModal(); };
};

App.closeModal = function(){ const m=document.getElementById('editmodal'); if(m) m.remove(); };

App.saveSub = async function(id){
  const cats={}; (App._adminCats||[]).forEach(c=>{ cats[c.key]=parseInt(document.getElementById('e-'+c.key).value||0); });
  const body={ id, cats,
    shift_date:document.getElementById('e-date').value,
    start_time:document.getElementById('e-start')?.value||'',
    end_time:document.getElementById('e-end')?.value||'',
    ot_hours:document.getElementById('e-ot').value,
    mileage:document.getElementById('e-miles').value,
    details:document.getElementById('e-details')?.value||'' };
  const btn=document.getElementById('e-save'); btn.disabled=true; btn.innerHTML='Saving<span class="dots"><span></span><span></span><span></span></span>';
  await App.api('/api/admin/update_submission','POST',body);
  App.closeModal(); App.loadAdminSubs();
};

App.deleteSub = async function(id){
  if(confirm('Delete this submission permanently? This affects leaderboard and reports.')){
    await App.api('/api/admin/delete_submission','POST',{id}); App.loadAdminSubs();
  }
};

App.loadAdminSettings = async function(){
  const el=document.getElementById('admin-content'); if(!el) return;
  const {data}=await App.api('/api/admin/settings');
  const tog=(key,label,desc)=>`
    <div style="display:flex;align-items:flex-start;gap:14px;padding:14px 0;border-bottom:1px solid var(--bd)">
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600;margin-bottom:2px">${label}</div>
        <div style="font-size:11px;color:var(--m)">${desc}</div>
      </div>
      <label style="position:relative;display:inline-block;width:42px;height:24px;flex-shrink:0;margin-top:2px">
        <input type="checkbox" id="s-${key}" ${data[key]==='true'?'checked':''} style="opacity:0;width:0;height:0" onchange="App._settingChanged()">
        <span style="position:absolute;cursor:pointer;inset:0;background:${data[key]==='true'?'var(--a)':'#333'};border-radius:12px;transition:.2s" id="s-${key}-track">
          <span style="position:absolute;left:${data[key]==='true'?'20px':'2px'};top:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:.2s" id="s-${key}-knob"></span>
        </span>
      </label>
    </div>`;
  const txt=(key,label,desc,placeholder)=>`
    <div style="padding:14px 0;border-bottom:1px solid var(--bd)">
      <div style="font-size:13px;font-weight:600;margin-bottom:2px">${label}</div>
      <div style="font-size:11px;color:var(--m);margin-bottom:8px">${desc}</div>
      <input class="input" id="s-${key}" value="${(data[key]||'').replace(/"/g,'&quot;')}" placeholder="${placeholder||''}"/>
    </div>`;
  el.innerHTML=`
    <div class="card" style="margin-bottom:16px">
      <div style="font-size:12px;font-weight:700;color:var(--a);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px">🏷️ Branding</div>
      ${txt('app_name','App Name','The name shown in the browser tab and header.','ShiftLog')}
      ${txt('department_name','Department Name','Shown in reports and the supervisor portal.','Blackfoot PD')}
      ${txt('default_department','Default Department on Signup','Pre-fills the department field on the sign-up form.','Blackfoot PD')}
    </div>
    <div class="card" style="margin-bottom:16px">
      <div style="font-size:12px;font-weight:700;color:var(--a);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px">🔐 Access Control</div>
      ${tog('allow_signup','Allow Officer Self-Signup','When off, only admins can create accounts.')}
      ${tog('require_email','Require Email on Signup','Officers must provide an email to register.')}
      ${tog('leaderboard_visible','Show Leaderboard','Display the live leaderboard on the submission form.')}
    </div>
    <div class="card" style="margin-bottom:16px">
      <div style="font-size:12px;font-weight:700;color:var(--g);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px">📢 Announcement Banner</div>
      ${tog('announcement_active','Show Announcement Banner','Displays a pinned message to all officers on the form page.')}
      <div style="padding:14px 0">
        <div style="font-size:13px;font-weight:600;margin-bottom:2px">Announcement Message</div>
        <div style="font-size:11px;color:var(--m);margin-bottom:8px">The message officers will see. Supports plain text.</div>
        <textarea class="input" id="s-announcement_text" rows="2" placeholder="e.g. Task force briefing Tuesday at 6 PM in the main conference room.">${data.announcement_text||''}</textarea>
      </div>
    </div>
    <div class="card" style="margin-bottom:16px">
      <div style="font-size:12px;font-weight:700;color:var(--am);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px">🚧 Maintenance</div>
      ${tog('maintenance_mode','Maintenance Mode','Prevents officer logins and shows a notice on the login page.')}
      <div style="padding:14px 0">
        <div style="font-size:13px;font-weight:600;margin-bottom:2px">Maintenance Message</div>
        <div style="font-size:11px;color:var(--m);margin-bottom:8px">Displayed on the login page when maintenance mode is on.</div>
        <textarea class="input" id="s-maintenance_message" rows="2">${data.maintenance_message||''}</textarea>
      </div>
    </div>
    <div id="settings-msg"></div>
    <button class="btn accent" id="settings-save" onclick="App.saveSettings()">Save Settings</button>`;

  // Wire up toggle visual feedback
  ['allow_signup','require_email','leaderboard_visible','maintenance_mode','announcement_active'].forEach(key=>{
    const inp=document.getElementById('s-'+key);
    const track=document.getElementById('s-'+key+'-track');
    const knob=document.getElementById('s-'+key+'-knob');
    if(!inp||!track||!knob) return;
    inp.addEventListener('change',()=>{
      track.style.background=inp.checked?'var(--a)':'#333';
      knob.style.left=inp.checked?'20px':'2px';
    });
  });
};

App._settingChanged = function(){};

App.saveSettings = async function(){
  const gv=id=>(document.getElementById(id)||{}).value||'';
  const gb=id=>(document.getElementById(id)||{}).checked;
  const body={
    app_name: gv('s-app_name'),
    department_name: gv('s-department_name'),
    default_department: gv('s-default_department'),
    allow_signup: gb('s-allow_signup')?'true':'false',
    require_email: gb('s-require_email')?'true':'false',
    leaderboard_visible: gb('s-leaderboard_visible')?'true':'false',
    maintenance_mode: gb('s-maintenance_mode')?'true':'false',
    maintenance_message: gv('s-maintenance_message'),
    announcement_active: gb('s-announcement_active')?'true':'false',
    announcement_text: gv('s-announcement_text'),
  };
  const btn=document.getElementById('settings-save'); btn.disabled=true; btn.innerHTML='Saving…';
  const {ok}=await App.api('/api/admin/settings','POST',body);
  btn.disabled=false; btn.textContent='Save Settings';
  const msg=document.getElementById('settings-msg');
  if(ok){
    Object.assign(App.settings, body);
    msg.innerHTML='<div class="err" style="color:var(--g);background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.2);margin-bottom:10px">✓ Settings saved successfully.</div>';
    document.title = (body.app_name||'ShiftLog') + ' — HVE Reporting';
  } else {
    msg.innerHTML='<div class="err shake">Failed to save settings.</div>';
  }
  setTimeout(()=>{ if(msg) msg.innerHTML=''; },4000);
};

App.setRole = async function(id,role){ await App.api('/api/admin/set_role','POST',{user_id:id,role}); App.loadAdmin(); };
App.deleteUser = async function(id,name){ if(confirm(`Remove ${name}? This cannot be undone.`)){ await App.api('/api/admin/delete_user','POST',{user_id:id}); App.loadAdmin(); } };

// boot
App.init();
</script>
</body>
</html>

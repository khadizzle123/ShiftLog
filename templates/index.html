<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ShiftLog — HVE Reporting</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --a:#3b82f6; --bg:#050505; --card:#0d0d0d; --bd:#1a1a1a;
  --m:#666; --w:#f0f0f0; --w2:#ccc; --g:#22c55e; --am:#f59e0b; --r:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Plus Jakarta Sans',sans-serif}
body{background:var(--bg);color:var(--w);min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
input,select,button,textarea{font-family:inherit}
a{color:var(--a);text-decoration:none}

/* nav */
.nav{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:rgba(5,5,5,.92);backdrop-filter:blur(10px);z-index:50}
.logo{font-size:16px;font-weight:800;cursor:pointer;flex-shrink:0}
.logo .b{color:var(--a)} .logo .l{color:var(--w)}
.nav-spacer{flex:1}
.nav-btn{background:transparent;border:1px solid var(--bd);color:var(--m);padding:5px 12px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.nav-btn.active{background:var(--a);border-color:var(--a);color:#fff}
.avatar{width:26px;height:26px;border-radius:50%;background:rgba(59,130,246,.18);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--a);flex-shrink:0}

/* layout */
.wrap{padding:20px 16px 48px}
.container{max-width:880px;margin:0 auto}
.narrow{max-width:440px;margin:30px auto}
.center{text-align:center}

/* cards */
.card{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:20px}
.card.glow{border-color:rgba(59,130,246,.4);box-shadow:0 0 20px rgba(59,130,246,.1)}
.card.pulse{animation:pulseGlow 2.4s ease-in-out infinite}

/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:13px 26px;border-radius:10px;border:none;background:#181818;color:var(--w);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;line-height:1.4;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn.accent{background:var(--a);color:#fff;box-shadow:0 0 20px rgba(59,130,246,.2)}
.btn.outline{background:transparent;border:1px solid var(--bd);color:var(--w2)}
.btn.small{padding:8px 16px;font-size:12px}
.btn.full{width:100%}
.btn:disabled{background:#1a1a1a;color:#444;cursor:not-allowed;box-shadow:none}

/* inputs */
.field{margin-bottom:14px}
.label{font-size:10px;color:var(--m);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.input{width:100%;background:#111;border:1px solid var(--bd);border-radius:8px;padding:11px 13px;color:var(--w);font-size:13px;outline:none;transition:border-color .2s}
.input:focus{border-color:var(--a)}
.row{display:flex;gap:12px;flex-wrap:wrap}
.row .field{flex:1;min-width:0;margin-bottom:0}

/* tags */
.tag{font-size:9px;font-weight:700;padding:3px 8px;border-radius:12px;text-transform:uppercase;letter-spacing:.4px}

/* counter */
.counter{display:flex;align-items:center;padding:7px 0;border-bottom:1px solid var(--bd)}
.counter .cl{flex:1;font-size:13px;font-weight:500;color:var(--w2)}
.stepper{display:flex;align-items:center;background:#141414;border-radius:10px;padding:2px 4px;transition:box-shadow .2s}
.stepper.flash{box-shadow:0 0 12px rgba(59,130,246,.35)}
.stepper button{width:40px;height:40px;background:transparent;border:none;color:var(--m);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:8px;transition:color .12s}
.stepper button.minus:hover{color:var(--r)} .stepper button.plus:hover{color:var(--g)}
.stepper .val{min-width:36px;text-align:center;font-size:16px;font-weight:700;transition:transform .15s,color .15s}
.spotlight{background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.2);border-radius:10px;padding:6px 12px;margin-bottom:10px}

/* stat tiles */
.tiles{display:flex;gap:10px;flex-wrap:wrap}
.tile{flex:1 1 0;min-width:80px;background:#0a0a0a;border:1px solid var(--bd);border-radius:10px;padding:14px 16px}
.tile.glow{border-color:rgba(59,130,246,.35);box-shadow:0 0 20px rgba(59,130,246,.12)}
.tile .tv{font-size:26px;font-weight:800;line-height:1.1}
.tile .tl{font-size:9px;color:var(--m);text-transform:uppercase;letter-spacing:.4px;margin-top:5px}

/* bars */
.bar{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.bar .bl{font-size:10px;color:var(--m);width:80px;text-align:right;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar .bt{flex:1;height:16px;background:#0a0a0a;border-radius:4px;overflow:hidden}
.bar .bf{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.16,1,.3,1)}
.bar .bv{font-size:11px;font-weight:700;color:var(--w);width:26px;text-align:right;flex-shrink:0}

/* table */
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--bd);border-radius:8px}
table{width:100%;border-collapse:collapse;font-size:11px}
thead tr{background:#0a0a0a}
th{padding:8px 10px;text-align:left;color:var(--m);border-bottom:1px solid var(--bd);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
td{padding:8px 10px;white-space:nowrap}

/* dropzone */
.dropzone{border:2px dashed var(--bd);border-radius:10px;padding:28px 16px;text-align:center;cursor:pointer;transition:all .2s}
.dropzone.over{border-color:var(--a);background:rgba(59,130,246,.06)}
.filechip{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#0a0a0a;border-radius:6px;margin-bottom:3px;font-size:12px;color:var(--w2)}
.filechip .fn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.filechip .fx{color:var(--m);cursor:pointer;font-size:14px}

/* leaderboard */
.lb{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:16px;width:200px;flex-shrink:0}
.lb-head{display:flex;align-items:center;gap:6px;margin-bottom:12px}
.lb-dot{width:7px;height:7px;border-radius:50%;background:var(--g);box-shadow:0 0 6px rgba(34,197,94,.5);animation:blink 1.5s infinite}
.lb-title{font-size:10px;font-weight:700;color:var(--w);letter-spacing:1px;text-transform:uppercase}
.lb-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bd)}
.lb-row:last-of-type{border-bottom:none}
.lb-medal{font-size:18px;line-height:1}
.lb-name{font-size:12px;font-weight:600;color:var(--w);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-badge{font-size:9px;color:var(--m)}
.lb-c{font-size:16px;font-weight:800}
.lb-cl{font-size:8px;color:var(--m);text-transform:uppercase}

/* misc */
.h1{font-size:24px;font-weight:800;margin-bottom:2px}
.sub{color:var(--m);font-size:13px;margin-bottom:20px}
.muted{color:var(--m)}
.err{font-size:11px;color:var(--am);padding:10px;background:rgba(245,158,11,.08);border-radius:8px;line-height:1.4;margin-bottom:12px}
.dots span{display:inline-block;width:5px;height:5px;border-radius:50%;background:#fff;margin-left:3px;animation:bdot .5s ease infinite alternate}
.dots span:nth-child(2){animation-delay:.12s} .dots span:nth-child(3){animation-delay:.24s}
.hidden{display:none!important}
.fade-in{animation:fadeIn .45s cubic-bezier(.16,1,.3,1) both}

@keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes bdot{from{transform:translateY(0)}to{transform:translateY(-3px)}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 20px rgba(245,158,11,.08)}50%{box-shadow:0 0 28px rgba(245,158,11,.2)}}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes shakeX{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.check{width:64px;height:64px;border-radius:50%;border:3px solid var(--g);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;animation:popIn .4s cubic-bezier(.16,1,.3,1);box-shadow:0 0 30px rgba(34,197,94,.25)}
.shake{animation:shakeX .35s ease}
canvas.confetti{position:fixed;inset:0;width:100vw;height:100vh;pointer-events:none;z-index:9999}
</style>
</head>
<body>
<div class="nav">
  <span class="logo" onclick="App.go(App.user?'form':'landing')"><span class="b">Shift</span><span class="l">Log</span></span>
  <div class="nav-spacer"></div>
  <div id="navlinks" style="display:flex;gap:6px;align-items:center"></div>
</div>
<div class="wrap"><div id="view"></div></div>

<script>
const CATS = [
  ['total_contacts','Total Contacts'],['seat_belt','Seat Belt Citations'],
  ['child_safety_seat','Child Safety Seat'],['speeding','Speeding Citations'],
  ['texting','Texting Citations'],['suspended_licenses','Suspended Licenses'],
  ['uninsured_motorists','Uninsured Motorists'],['dui_alcohol','DUI - Alcohol'],
  ['dui_drugs','DUI - Drugs'],['dui_drugs_alcohol','DUI - Drugs & Alcohol'],
  ['underage_alcohol','Underage Alcohol'],['reckless_driving','Reckless Driving'],
  ['inattentive_driving','Inattentive Driving'],['felony_arrests','Felony Arrests'],
  ['recovered_stolen','Recovered Stolen'],['fugitives','Fugitives'],
  ['motorcycle_endorsement','Motorcycle'],['bicycle_pedestrian','Bicycle/Pedestrian'],
  ['other_activity','Other']
];
const MEDIA = [
  ['media_letters','Letters'],['media_press','Press Release'],['media_social','Social Media'],
  ['media_events','Events'],['media_interviews','Interviews'],
  ['media_presentations','Presentations'],['media_other','Other']
];

const App = {
  user: null,
  page: 'landing',
  form: {},

  async init(){
    try {
      const r = await fetch('/api/me');
      const j = await r.json();
      this.user = j.user;
    } catch(e){}
    this.go(this.user ? 'form' : 'landing');
  },

  async api(path, method='GET', body){
    const opt = {method, headers:{}};
    if(body){ opt.headers['Content-Type']='application/json'; opt.body=JSON.stringify(body); }
    const r = await fetch(path, opt);
    let j = {};
    try { j = await r.json(); } catch(e){}
    return {ok:r.ok, status:r.status, data:j};
  },

  go(page){
    this.page = page;
    this.renderNav();
    const v = document.getElementById('view');
    v.innerHTML = '';
    const fn = this['page_'+page];
    if(fn) fn.call(this, v);
    v.classList.remove('fade-in'); void v.offsetWidth; v.classList.add('fade-in');
    window.scrollTo(0,0);
  },

  renderNav(){
    const n = document.getElementById('navlinks');
    let links = [];
    if(this.user){
      links.push(['form','Form']);
      if(['admin','supervisor'].includes(this.user.role)) links.push(['supervisor','Supervisor']);
      if(this.user.role==='admin') links.push(['admin','Admin']);
    }
    let html = links.map(([id,label])=>
      `<button class="nav-btn ${this.page===id?'active':''}" onclick="App.go('${id}')">${label}</button>`
    ).join('');
    if(this.user){
      html += `<div style="display:flex;align-items:center;gap:6px;margin-left:6px">
        <div class="avatar">${(this.user.name||'?')[0]}</div>
        <span style="font-size:10px;color:var(--w2);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${this.user.name}</span>
        <span style="font-size:10px;color:var(--m);cursor:pointer" onclick="App.logout()">Logout</span>
      </div>`;
    } else {
      html += `<button class="nav-btn active" onclick="App.go('login')">Log In</button>
               <button class="nav-btn" onclick="App.go('signup')">Sign Up</button>`;
    }
    n.innerHTML = html;
  },

  async logout(){ await this.api('/api/logout','POST'); this.user=null; this.go('landing'); },

  // ===== animations =====
  countUp(el, target, dur=1000){
    let s=null; const step=t=>{ if(!s)s=t; const p=Math.min((t-s)/dur,1);
      el.textContent = Math.round((1-Math.pow(1-p,3))*target);
      if(p<1) requestAnimationFrame(step); }; requestAnimationFrame(step);
  },
  confetti(){
    const c=document.createElement('canvas'); c.className='confetti'; document.body.appendChild(c);
    c.width=innerWidth; c.height=innerHeight; const ctx=c.getContext('2d');
    const cols=['#3b82f6','#8b5cf6','#22c55e','#f59e0b','#ef4444','#ec4899','#06b6d4'];
    let P=Array.from({length:110},()=>({x:Math.random()*c.width,y:-20-Math.random()*300,w:4+Math.random()*5,h:8+Math.random()*8,vx:(Math.random()-.5)*5,vy:2+Math.random()*4,r:Math.random()*360,rv:(Math.random()-.5)*10,c:cols[~~(Math.random()*cols.length)],o:1}));
    let f=0; const draw=()=>{ ctx.clearRect(0,0,c.width,c.height);
      P.forEach(p=>{p.x+=p.vx;p.vy+=.1;p.y+=p.vy;p.r+=p.rv;if(f>50)p.o=Math.max(0,p.o-.01);
        ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r*Math.PI/180);ctx.globalAlpha=p.o;ctx.fillStyle=p.c;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();});
      f++; if(f<180) requestAnimationFrame(draw); else c.remove(); };
    requestAnimationFrame(draw);
  },

  // ===== pages render below (injected) =====
};

// ===================== PAGES =====================

App.page_landing = function(v){
  v.innerHTML = `
    <div class="center" style="padding-top:60px;max-width:520px;margin:0 auto">
      <div style="font-size:44px;font-weight:800;margin-bottom:6px">
        <span style="color:var(--a);text-shadow:0 0 30px rgba(59,130,246,.3)">Shift</span><span style="color:var(--w)">Log</span></div>
      <p style="color:var(--m);font-size:15px;line-height:1.6;margin-bottom:36px">HVE Traffic Task Force Reporting.<br/>Track, report, and analyze enforcement activity.</p>
      <div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap">
        <button class="btn accent" onclick="App.go('login')">Log In</button>
        <button class="btn outline" onclick="App.go('signup')">Sign Up</button>
      </div>
    </div>`;
};

App.page_signup = function(v){
  v.innerHTML = `
    <div class="narrow">
      <h2 class="h1">Create Account</h2>
      <p class="sub">Join your department's ShiftLog.</p>
      <div class="card">
        <div class="field"><label class="label">Last Name</label><input class="input" id="su-name" placeholder="e.g. Hansen"/></div>
        <div class="row" style="margin-bottom:14px">
          <div class="field"><label class="label">Badge Number</label><input class="input" id="su-badge" placeholder="e.g. 4521"/></div>
          <div class="field"><label class="label">Department</label><input class="input" id="su-dept" placeholder="Blackfoot PD" value="Blackfoot PD"/></div>
        </div>
        <div class="field"><label class="label">Email</label><input class="input" id="su-email" type="email" placeholder="officer@department.gov"/></div>
        <div class="field"><label class="label">Password</label><input class="input" id="su-pw" type="password" placeholder="Create a password"/></div>
        <div class="field"><label class="label">Role</label>
          <select class="input" id="su-role">
            <option value="officer">Officer</option>
            <option value="supervisor">Supervisor (requires admin approval)</option>
          </select></div>
        <div id="su-err"></div>
        <button class="btn accent full" id="su-btn" onclick="App.doSignup()">Create Account</button>
      </div>
      <div class="center" style="margin-top:14px">
        <span class="muted" style="font-size:12px">Already have an account? </span>
        <a style="font-size:12px;font-weight:600;cursor:pointer" onclick="App.go('login')">Log In</a>
      </div>
    </div>`;
};

App.doSignup = async function(){
  const g = id => document.getElementById(id).value.trim();
  const body = {name:g('su-name'),badge:g('su-badge'),department:g('su-dept'),
    email:g('su-email'),password:document.getElementById('su-pw').value,role:g('su-role')};
  const errEl = document.getElementById('su-err');
  if(!body.name||!body.badge||!body.password){ errEl.innerHTML='<div class="err shake">Name, badge, and password are required.</div>'; return; }
  const btn = document.getElementById('su-btn');
  btn.disabled=true; btn.innerHTML='Creating<span class="dots"><span></span><span></span><span></span></span>';
  const {ok,data} = await App.api('/api/signup','POST',body);
  if(!ok){ errEl.innerHTML=`<div class="err shake">${data.error||'Sign up failed.'}</div>`; btn.disabled=false; btn.textContent='Create Account'; return; }
  App.user = data.user;
  App.showSignupSuccess(data);
};

App.showSignupSuccess = function(data){
  const v = document.getElementById('view');
  v.innerHTML = `
    <div class="narrow center">
      <div class="check"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></div>
      <h2 class="h1">Account Created!</h2>
      <p class="sub">Welcome, <strong style="color:var(--w)">${data.user.name}</strong>. Badge #${data.user.badge}.</p>
      ${data.user.role==='pending_supervisor'?`<div class="err" style="color:var(--am)">⏳ Supervisor access pending admin approval. You can use the officer form now.</div>`:''}
      <button class="btn accent" onclick="App.go('form')">Go to Form →</button>
    </div>`;
  App.renderNav();
};

App.page_login = function(v){
  v.innerHTML = `
    <div class="narrow">
      <h2 class="h1">Welcome Back</h2>
      <p class="sub">Log in with your badge number.</p>
      <div class="card">
        <div class="field"><label class="label">Badge Number</label><input class="input" id="li-badge" placeholder="Enter badge #"/></div>
        <div class="field"><label class="label">Password</label><input class="input" id="li-pw" type="password" placeholder="Your password" onkeydown="if(event.key==='Enter')App.doLogin()"/></div>
        <div id="li-err"></div>
        <button class="btn accent full" id="li-btn" onclick="App.doLogin()">Log In</button>
      </div>
      <div class="center" style="margin-top:14px">
        <span class="muted" style="font-size:12px">New here? </span>
        <a style="font-size:12px;font-weight:600;cursor:pointer" onclick="App.go('signup')">Sign Up</a>
      </div>
    </div>`;
};

App.doLogin = async function(){
  const badge = document.getElementById('li-badge').value.trim();
  const pw = document.getElementById('li-pw').value;
  const errEl = document.getElementById('li-err');
  const btn = document.getElementById('li-btn');
  btn.disabled=true; btn.innerHTML='Signing in<span class="dots"><span></span><span></span><span></span></span>';
  const {ok,data} = await App.api('/api/login','POST',{badge,password:pw});
  if(!ok){ errEl.innerHTML=`<div class="err shake">${data.error||'Login failed.'}</div>`; btn.disabled=false; btn.textContent='Log In'; return; }
  App.user = data.user;
  App.go(['admin'].includes(data.user.role)?'admin':'form');
};

App.page_form = function(v){
  if(!this.user){ this.go('login'); return; }
  this.form = {};
  const u = this.user;
  const counterRow = (key,label,spot)=>`
    <div class="counter">
      <span class="cl">${label}</span>
      <div class="stepper" id="st-${key}">
        <button class="minus" onclick="App.bump('${key}',-1)">−</button>
        <span class="val" id="v-${key}" style="color:var(--w)">0</span>
        <button class="plus" onclick="App.bump('${key}',1)">+</button>
      </div>
    </div>`;
  v.innerHTML = `
    <div style="display:flex;gap:20px;align-items:flex-start;max-width:880px;margin:0 auto;flex-wrap:wrap">
      <div style="flex:1;min-width:280px">
        <div class="card" style="margin-bottom:14px;padding:14px">
          <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">
            <div><div class="label">Officer</div><div style="font-size:14px;font-weight:700">${u.name}</div></div>
            <div><div class="label">Badge</div><div style="font-size:14px;font-weight:700">#${u.badge}</div></div>
            <div><div class="label">Dept</div><div style="font-size:14px;font-weight:700">${u.department||'—'}</div></div>
            <div style="flex:1"></div>
            <span class="tag" style="background:rgba(59,130,246,.15);color:var(--a)">${u.role}</span>
          </div>
        </div>
        <div class="card" style="margin-bottom:14px;padding:14px">
          <div class="row">
            <div class="field"><label class="label">Date</label><input class="input" id="f-date" type="date"/></div>
            <div class="field"><label class="label">Start Time</label><input class="input" id="f-start" placeholder="e.g. 6:00 PM"/></div>
            <div class="field"><label class="label">End Time</label><input class="input" id="f-end" placeholder="e.g. 2:00 AM"/></div>
            <div class="field" style="flex:0 0 56px"><label class="label">OT</label><input class="input" id="f-ot" placeholder="0"/></div>
            <div class="field" style="flex:0 0 64px"><label class="label">Miles</label><input class="input" id="f-miles" placeholder="0"/></div>
          </div>
        </div>
        <div class="card" style="margin-bottom:14px">
          <div class="spotlight">${counterRow(CATS[0][0],CATS[0][1],true)}</div>
          ${CATS.slice(1).map(([k,l])=>counterRow(k,l)).join('')}
        </div>
        <div class="card" style="margin-bottom:14px">
          <div class="label" style="margin-bottom:10px">Media Outreach</div>
          ${MEDIA.map(([k,l])=>counterRow(k,l)).join('')}
        </div>
        <div class="card" style="margin-bottom:14px">
          <label class="label">Details & Comments</label>
          <textarea class="input" id="f-details" rows="3" placeholder="Notes about the shift..."></textarea>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="font-size:13px;color:var(--m)">Total: <strong id="f-total" style="color:var(--m);font-size:18px">0</strong></div>
          <button class="btn accent" onclick="App.submitForm()">Review & Submit →</button>
        </div>
      </div>
      <div class="lb" id="lb"><div class="muted" style="font-size:11px">Loading leaders…</div></div>
    </div>`;
  CATS.concat(MEDIA).forEach(([k])=> this.form[k]=0);
  this.loadLeaderboard();
};

App.bump = function(key,delta){
  this.form[key] = Math.max(0,(this.form[key]||0)+delta);
  const el = document.getElementById('v-'+key);
  el.textContent = this.form[key];
  el.style.color = this.form[key]>0 ? 'var(--a)' : 'var(--w)';
  el.style.transform='scale(1.25)'; setTimeout(()=>el.style.transform='scale(1)',150);
  const st = document.getElementById('st-'+key); st.classList.add('flash'); setTimeout(()=>st.classList.remove('flash'),250);
  // total = sum of activity cats only
  let t=0; CATS.forEach(([k])=> t+=this.form[k]||0);
  const tot=document.getElementById('f-total'); tot.textContent=t; tot.style.color=t>0?'var(--a)':'var(--m)';
};

App.loadLeaderboard = async function(){
  const {data} = await App.api('/api/leaderboard');
  const lb = document.getElementById('lb'); if(!lb) return;
  const medals=['🥇','🥈','🥉'];
  let rows = (data.leaders||[]).map((o,i)=>`
    <div class="lb-row">
      <span class="lb-medal">${medals[i]}</span>
      <div style="flex:1;min-width:0"><div class="lb-name">${o.name}</div><div class="lb-badge">#${o.badge}</div></div>
      <div style="text-align:right"><div class="lb-c" style="color:${i===0?'var(--a)':'var(--w)'}">${o.contacts}</div><div class="lb-cl">contacts</div></div>
    </div>`).join('');
  if(!rows) rows = '<div class="muted" style="font-size:11px;padding:8px 0">No submissions today yet.</div>';
  lb.innerHTML = `<div class="lb-head"><div class="lb-dot"></div><span class="lb-title">Today's Leaders</span></div>${rows}
    <div style="margin-top:8px;text-align:center;font-size:8px;color:var(--m)">Live • updates every 30s</div>`;
  clearTimeout(App._lbTimer); App._lbTimer=setTimeout(()=>App.loadLeaderboard(),30000);
};

App.submitForm = async function(){
  const g=id=>{const e=document.getElementById(id);return e?e.value:'';};
  const payload = {
    name:this.user.name, badge:this.user.badge,
    date:g('f-date'), start_time:g('f-start'), end_time:g('f-end'),
    ot_hours:g('f-ot'), mileage:g('f-miles'), details:g('f-details'),
    ...this.form
  };
  this.lastPayload = payload;
  // save to DB
  await App.api('/api/submit','POST',payload);
  this.go('summary');
};

App.page_summary = function(v){
  const p = this.lastPayload || {};
  let contacts = p.total_contacts||0;
  let citations = ['seat_belt','speeding','texting','suspended_licenses','child_safety_seat','reckless_driving','inattentive_driving','uninsured_motorists'].reduce((a,k)=>a+(p[k]||0),0);
  let arrests = ['dui_alcohol','dui_drugs','dui_drugs_alcohol','felony_arrests'].reduce((a,k)=>a+(p[k]||0),0);
  v.innerHTML = `
    <div class="center" style="max-width:520px;margin:0 auto;padding-top:20px">
      <div class="check"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></div>
      <h2 class="h1">Report Ready</h2>
      <div class="card" style="margin:16px 0;text-align:left">
        <div style="display:flex;gap:20px;margin-bottom:18px">
          <div><div class="label">Officer</div><div style="font-size:15px;font-weight:700">${this.user.name}</div></div>
          <div><div class="label">Badge</div><div style="font-size:15px;font-weight:700">#${this.user.badge}</div></div>
        </div>
        <div class="tiles">
          <div class="tile glow"><div class="tv" style="color:var(--a)" id="t-c">0</div><div class="tl">Total Actions</div></div>
          <div class="tile"><div class="tv" style="color:#8b5cf6" id="t-ci">0</div><div class="tl">Citations</div></div>
          <div class="tile"><div class="tv" style="color:var(--r)" id="t-a">0</div><div class="tl">Arrests</div></div>
        </div>
      </div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="btn accent" id="dl-btn" onclick="App.downloadPDF()">⬇ Download PDF</button>
        <button class="btn outline" onclick="App.go('form')">← Back to Form</button>
      </div>
      <div id="dl-msg"></div>
    </div>`;
  this.countUp(document.getElementById('t-c'), contacts+citations+arrests);
  this.countUp(document.getElementById('t-ci'), citations);
  this.countUp(document.getElementById('t-a'), arrests);
};

App.downloadPDF = async function(){
  const btn=document.getElementById('dl-btn');
  btn.disabled=true; btn.innerHTML='Generating<span class="dots"><span></span><span></span><span></span></span>';
  try{
    const r = await fetch('/generate_pdf',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(this.lastPayload)});
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url;
    a.download=`HVE_Report_${(this.user.name||'officer').replace(/ /g,'_')}_${(this.lastPayload.date||'').replace(/\//g,'-')}.pdf`;
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    btn.disabled=false; btn.textContent='✓ Downloaded!';
    document.getElementById('dl-msg').innerHTML='<p style="color:var(--g);font-size:12px;margin-top:14px;font-weight:600">🎉 HVE report saved!</p>';
    App.confetti();
  }catch(e){ btn.disabled=false; btn.textContent='⬇ Download PDF'; document.getElementById('dl-msg').innerHTML='<div class="err">Download failed. Try again.</div>'; }
};

App.page_supervisor = function(v){
  if(!this.user||!['admin','supervisor'].includes(this.user.role)){ this.go('form'); return; }
  this.supFiles = [];
  this.showAllCols = false;
  v.innerHTML = `
    <div class="container">
      <h1 class="h1">Supervisor Portal</h1>
      <p class="sub">Upload reports and track officer performance.</p>

      <div class="card" style="margin-bottom:16px">
        <div style="font-size:12px;font-weight:700;color:var(--a);margin-bottom:14px;text-transform:uppercase;letter-spacing:.8px">📂 Upload Officer PDFs</div>
        <div class="row" style="margin-bottom:12px">
          <div class="field"><label class="label">Officer Last Name</label><input class="input" id="up-name" placeholder="e.g. Hansen"/></div>
          <div class="field"><label class="label">Badge Number</label><input class="input" id="up-badge" placeholder="e.g. 4521"/></div>
        </div>
        <div class="dropzone" id="dz" onclick="document.getElementById('fileinput').click()">
          <div style="font-size:28px;margin-bottom:6px">📄</div>
          <div style="font-size:13px;font-weight:600">Drop PDFs here or click to add</div>
          <div style="font-size:10px;color:var(--m);margin-top:3px">Accepts multiple filled HVE reports</div>
        </div>
        <input type="file" id="fileinput" multiple accept="application/pdf" class="hidden"/>
        <div id="filelist" style="margin-top:10px"></div>
      </div>

      <div id="reportcards"></div>

      <div class="card">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
          <span style="font-size:12px;font-weight:700;color:var(--a);text-transform:uppercase;letter-spacing:.8px">📊 Performance</span>
          <div style="flex:1"></div>
          <select class="input" id="perf-officer" style="width:auto;font-size:11px;padding:7px 10px" onchange="App.loadPerformance()">
            <option value="all">All Officers</option>
          </select>
        </div>
        <div id="perf-content"><div class="muted" style="font-size:12px">Loading…</div></div>
      </div>
    </div>`;

  // wire up file input + drag/drop
  const dz=document.getElementById('dz'), fi=document.getElementById('fileinput');
  fi.onchange=()=>{ App.supFiles.push(...Array.from(fi.files)); App.renderFiles(); };
  dz.ondragover=e=>{e.preventDefault();dz.classList.add('over')};
  dz.ondragleave=()=>dz.classList.remove('over');
  dz.ondrop=e=>{e.preventDefault();dz.classList.remove('over');App.supFiles.push(...Array.from(e.dataTransfer.files));App.renderFiles();};

  this.loadOfficers();
  this.loadPerformance();
};

App.renderFiles = function(){
  const fl=document.getElementById('filelist'); if(!fl) return;
  if(!App.supFiles.length){ fl.innerHTML=''; return; }
  fl.innerHTML = App.supFiles.map((f,i)=>`
    <div class="filechip"><span>📄</span><span class="fn">${f.name}</span><span class="fx" onclick="App.supFiles.splice(${i},1);App.renderFiles()">✕</span></div>
  `).join('') + `<button class="btn accent small full" id="proc-btn" style="margin-top:10px" onclick="App.processFiles()">Process ${App.supFiles.length} file${App.supFiles.length>1?'s':''}</button>`;
};

App.processFiles = async function(){
  const name=document.getElementById('up-name').value.trim();
  const badge=document.getElementById('up-badge').value.trim();
  const btn=document.getElementById('proc-btn');
  if(!name){ alert('Enter the officer name first.'); return; }
  btn.disabled=true; btn.innerHTML='Extracting<span class="dots"><span></span><span></span><span></span></span>';
  const fd=new FormData();
  fd.append('officer_name',name); fd.append('badge',badge);
  App.supFiles.forEach(f=>fd.append('files',f));
  await fetch('/api/import_pdf',{method:'POST',body:fd});
  btn.textContent='✓ Done — reports ready below';
  App.supFiles=[];
  App.showReportCards();
  App.loadOfficers(); App.loadPerformance();
};

App.showReportCards = function(){
  const officer = document.getElementById('perf-officer')?.value || 'all';
  document.getElementById('reportcards').innerHTML = `
    <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">
      <div class="card" style="flex:1 1 240px;cursor:pointer" onclick="App.downloadReport('history')">
        <div style="font-size:26px;margin-bottom:8px">📋</div>
        <div style="font-size:15px;font-weight:700;margin-bottom:4px">History Report</div>
        <div style="font-size:11px;color:var(--m);margin-bottom:14px;line-height:1.4">Every submission by date & category</div>
        <div style="padding-top:10px;border-top:1px solid var(--bd);font-size:12px;color:var(--a);font-weight:600">⬇ Download PDF</div>
      </div>
      <div class="card glow" style="flex:1 1 240px;cursor:pointer" onclick="App.downloadReport('stats')">
        <div style="font-size:26px;margin-bottom:8px">📊</div>
        <div style="font-size:15px;font-weight:700;margin-bottom:4px">Stats Summary</div>
        <div style="font-size:11px;color:var(--m);margin-bottom:14px;line-height:1.4">Combined totals, bar graph & officer breakdown</div>
        <div style="padding-top:10px;border-top:1px solid var(--bd);font-size:12px;color:var(--a);font-weight:600">⬇ Download PDF</div>
      </div>
    </div>`;
};

App.downloadReport = async function(kind){
  const officer=document.getElementById('perf-officer')?.value||'all';
  const r=await fetch(`/api/report/${kind}?officer=${encodeURIComponent(officer)}`);
  const blob=await r.blob(); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=`HVE_${kind}_${officer}.pdf`;
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
};

App.loadOfficers = async function(){
  const {data}=await App.api('/api/officers');
  const sel=document.getElementById('perf-officer'); if(!sel) return;
  const cur=sel.value;
  sel.innerHTML='<option value="all">All Officers</option>'+(data.officers||[]).map(o=>`<option value="${o}">${o}</option>`).join('');
  sel.value=cur;
};

App.loadPerformance = async function(){
  const officer=document.getElementById('perf-officer')?.value||'all';
  const {data}=await App.api(`/api/performance?officer=${encodeURIComponent(officer)}`);
  const el=document.getElementById('perf-content'); if(!el) return;
  const t=data.totals||{};
  const citations=['seat_belt','speeding','texting','suspended_licenses','child_safety_seat','reckless_driving','inattentive_driving','uninsured_motorists'].reduce((a,k)=>a+(t[k]||0),0);
  const arrests=['dui_alcohol','dui_drugs','dui_drugs_alcohol','felony_arrests'].reduce((a,k)=>a+(t[k]||0),0);
  const tiles=[['Contacts',t.total_contacts||0,'var(--a)',true],['Citations',citations,'#8b5cf6'],['Arrests',arrests,'var(--r)'],['Forms',data.count||0,'var(--g)']];
  const barData=[['Contacts',t.total_contacts||0,'#3b82f6'],['Seat Belt',t.seat_belt||0,'#6366f1'],['Speeding',t.speeding||0,'#8b5cf6'],['Suspended',t.suspended_licenses||0,'#a855f7'],['Texting',t.texting||0,'#c084fc'],['DUI',t.dui_alcohol||0,'var(--r)'],['Felony',t.felony_arrests||0,'var(--am)']];
  const mx=Math.max(t.total_contacts||0,1);
  const coreCols=CATS.slice(0,8);
  const cols=App.showAllCols?CATS:coreCols;
  el.innerHTML=`
    <div class="tiles" style="margin-bottom:18px">
      ${tiles.map(([l,val,c,glow])=>`<div class="tile ${glow?'glow':''}"><div class="tv" style="color:${c}">${val}</div><div class="tl">${l}</div></div>`).join('')}
    </div>
    <div style="margin-bottom:18px">
      ${barData.map(([l,val,c])=>`<div class="bar"><span class="bl">${l}</span><div class="bt"><div class="bf" style="width:${(val/mx)*100}%;background:${c};box-shadow:0 0 8px ${c}66"></div></div><span class="bv">${val}</span></div>`).join('')}
    </div>
    <div style="display:flex;align-items:center;margin-bottom:10px">
      <span style="font-size:11px;font-weight:600;color:var(--w2);text-transform:uppercase;letter-spacing:.5px">Submission History</span>
      <div style="flex:1"></div>
      <button class="nav-btn ${App.showAllCols?'active':''}" onclick="App.showAllCols=!App.showAllCols;App.loadPerformance()">${App.showAllCols?'Show core columns':'Show all categories'}</button>
    </div>
    <div class="table-scroll">
      <table style="min-width:${App.showAllCols?'900px':'500px'}">
        <thead><tr><th>Date</th><th>Officer</th>${cols.map(([k,l])=>`<th>${l}</th>`).join('')}</tr></thead>
        <tbody>
          ${(data.rows||[]).map(r=>`<tr><td style="color:var(--w2)">${r.date}</td><td style="color:var(--w);font-weight:600">${r.officer||''}</td>${cols.map(([k])=>`<td style="color:${k==='total_contacts'?'var(--a)':(r[k]>0?'var(--w2)':'#2a2a2a')};font-weight:${k==='total_contacts'?'700':'400'}">${r[k]||0}</td>`).join('')}</tr>`).join('') || `<tr><td colspan="${cols.length+2}" style="color:var(--m);padding:16px">No submissions yet.</td></tr>`}
        </tbody>
      </table>
    </div>
    <div style="font-size:10px;color:var(--m);margin-top:8px;text-align:right">Showing ${data.count||0} submission${data.count===1?'':'s'}${officer!=='all'?' for '+officer:''}</div>`;
};

App.page_admin = function(v){
  if(!this.user||this.user.role!=='admin'){ this.go('form'); return; }
  v.innerHTML=`<div class="container">
    <h1 class="h1">Admin Panel</h1>
    <p class="sub">Manage users and approve supervisor requests.</p>
    <div id="admin-content"><div class="muted" style="font-size:12px">Loading…</div></div>
  </div>`;
  this.loadAdmin();
};

App.loadAdmin = async function(){
  const {data}=await App.api('/api/admin/users');
  const el=document.getElementById('admin-content'); if(!el) return;
  const users=data.users||[];
  const pending=users.filter(u=>u.role==='pending_supervisor');
  const roleColor=r=>r==='admin'?'var(--am)':r==='supervisor'?'var(--a)':r==='pending_supervisor'?'var(--am)':'var(--m)';
  let html='';
  if(pending.length){
    html+=`<div class="card pulse" style="margin-bottom:20px">
      <div style="font-size:12px;font-weight:700;color:var(--am);margin-bottom:14px;text-transform:uppercase;letter-spacing:.8px">⏳ Pending Supervisor Requests</div>
      ${pending.map(u=>`<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--bd);flex-wrap:wrap">
        <div style="flex:1;min-width:120px"><div style="font-size:13px;font-weight:600">${u.name}</div><div style="font-size:10px;color:var(--m)">Badge #${u.badge} • ${u.department||'—'}</div></div>
        <div style="display:flex;gap:8px">
          <button class="btn accent small" onclick="App.setRole(${u.id},'supervisor')">✓ Approve</button>
          <button class="btn outline small" onclick="App.setRole(${u.id},'officer')">✕ Deny</button>
        </div></div>`).join('')}
    </div>`;
  }
  html+=`<div class="card">
    <div style="font-size:12px;font-weight:700;margin-bottom:14px;text-transform:uppercase;letter-spacing:.8px">All Users (${users.length})</div>
    ${users.map(u=>`<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--bd)">
      <div class="avatar" style="background:${u.role==='admin'?'rgba(245,158,11,.18)':u.role==='supervisor'?'rgba(59,130,246,.18)':'#151515'};color:${roleColor(u.role)}">${u.name[0]}</div>
      <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${u.name}</div><div style="font-size:10px;color:var(--m);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">#${u.badge} • ${u.email||'no email'}</div></div>
      <span class="tag" style="background:${roleColor(u.role)}22;color:${roleColor(u.role)}">${u.role==='pending_supervisor'?'pending':u.role}</span>
      ${u.role!=='admin'?`<span style="font-size:12px;color:#444;cursor:pointer;padding:6px" onclick="App.deleteUser(${u.id},'${u.name}')">🗑</span>`:''}
    </div>`).join('')}
  </div>`;
  el.innerHTML=html;
};

App.setRole = async function(id,role){ await App.api('/api/admin/set_role','POST',{user_id:id,role}); App.loadAdmin(); };
App.deleteUser = async function(id,name){ if(confirm(`Remove ${name}? This cannot be undone.`)){ await App.api('/api/admin/delete_user','POST',{user_id:id}); App.loadAdmin(); } };

// boot
App.init();
</script>
</body>
</html>
